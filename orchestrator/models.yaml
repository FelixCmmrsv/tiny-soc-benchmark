# ============================================================================
# Model registry -- add ANY vendor here.
# ============================================================================
# Every entry runs through the SAME `claude` CLI + Claude Code engine (same
# tools, same Elastic skills, same MCP proctor) -- only the backend model
# differs, so scores are comparable across vendors. Two kinds of entry:
#
#   native: true    -> talks to Anthropic directly, using the OAuth token in
#                      .secrets/claude_oauth_token.txt.
#
#   routed (default) -> a fresh per-run claude-code-router (ccr) instance is
#                      pointed at the provider's OpenAI-compatible endpoint.
#                      Works for any OpenAI-compatible API: other clouds
#                      (OpenAI, xAI, Google, DeepSeek, OpenRouter, Groq, ...)
#                      and local servers (Ollama, vLLM, LM Studio, ...).
#
# ---- Schema for a routed entry --------------------------------------------
#   <your-name>:                 # what you pass to --model
#     native: false
#     provider_name: <label>     # any label; names the ccr provider
#     api_base_url: <url>        # the OpenAI-compatible chat-completions URL
#     api_key_env: <NAME>        # -> the key is read from .secrets/<NAME>.txt
#     model: <upstream-model-id>
#     transformer: <name>        # optional, see "Transformers" below
#     transformer_path: <path>   # optional; only for CUSTOM transformers,
#                                # relative to harness/ (ccr_manager resolves it)
#     effort: <low|medium|high|xhigh|max>   # optional
#
# The API key is read from .secrets/<api_key_env>.txt (chmod 600) and injected
# only as a per-run env var -- never written into ccr's generated config on
# disk. Run `run_benchmark.py --list-models` to see, per model, which secret
# file it needs and whether it's present.
#
# ---- Transformers (reconcile Claude Code's request shape with the target) --
# Claude Code always sends an Anthropic-style request incl. a `reasoning`
# field. ccr rewrites it to the target provider via a transformer. Pick one:
#
#   * OpenAI's own reasoning models (gpt-5.x, o-series):
#         transformer: openai-reasoning-fix
#         transformer_path: ccr_transformers/openai-reasoning-fix.js
#     (strips `reasoning`, and renames max_tokens -> max_completion_tokens)
#
#   * Any other OpenAI-compatible endpoint (DeepSeek, Together, local vLLM/
#     Ollama/LM Studio, OpenRouter in OpenAI format, ...):
#         transformer: strip-reasoning
#         transformer_path: ccr_transformers/strip-reasoning.js
#     (strips `reasoning`; keeps max_tokens -- the safe generic default)
#
#   * xAI (grok):
#         transformer: xai-high-effort
#         transformer_path: ccr_transformers/xai-high-effort.js
#
#   * Providers ccr has a BUILT-IN transformer for (no transformer_path
#     needed): gemini, deepseek, groq, openrouter, vertex-gemini, ...
#         transformer: gemini
#
#   * A lenient server that accepts unknown fields: omit `transformer` entirely.
# ============================================================================


# ---- Working, verified entries --------------------------------------------

claude-sonnet-5:
  native: true
  model: claude-sonnet-5
  effort: xhigh

gpt-5.5:
  native: false
  provider_name: openai
  api_base_url: https://api.openai.com/v1/chat/completions
  api_key_env: OPENAI_API_KEY
  model: gpt-5.5
  transformer: openai-reasoning-fix
  transformer_path: ccr_transformers/openai-reasoning-fix.js

grok-4.3:
  native: false
  provider_name: xai
  api_base_url: https://api.x.ai/v1/chat/completions
  api_key_env: XAI_API_KEY
  model: grok-4.3
  transformer: xai-high-effort
  transformer_path: ccr_transformers/xai-high-effort.js
  effort: high


