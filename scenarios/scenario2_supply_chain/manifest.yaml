scenario_id: scenario2_supply_chain
title: Атака на цепочку поставок (Ginzer Corp / PolarWinds)
capability_profile: elastic-forensics
briefing: 'Человечество в локдауне. Новый опасный вирус стремительно распространяется

  по планете. Альфред Гинзер и его компания, фармацевтический гигант Ginzer

  Corp, ведут исследования новой вакцины от вируса, способной вернуть

  человечество к прежней жизни. В последнее время они добились значительных

  успехов, и появление вакцины — лишь вопрос времени. Многие организации и

  государства не прочь заполучить результаты разработок Ginzer Corp в свои

  руки и заработать миллиарды на этом.


  Компания Ginzer Corp надежно защищена от кибератак. Однако она использует

  для исследований лабораторное ПО AstraLIMS, разработанное ее дочерней

  компанией PolarWinds, которая не очень заботится о защите инфраструктуры.


  Беспечное отношение компании PolarWinds к безопасности привело к тому, что

  ее инфраструктуру скомпрометировали неизвестные. Во время атаки

  злоумышленники смогли добраться до сервера обновлений ПО AstraLIMS

  (rigel.polarwinds.com) и модифицировать один из исполняемых файлов ПО.

  Спустя некоторое время этот файл был загружен и выполнен в инфраструктуре

  Ginzer Corp в рамках планового обновления ПО на сервере AstraLIMS

  (astralims.ginzercorp.com). В результате злоумышленники получили начальный

  доступ к инфраструктуре Ginzer Corp, повысили свои привилегии и смогли

  украсть конфиденциальные документы, касающиеся передовых исследований

  вакцины от вируса, с рабочего ноутбука основателя компании Альфреда

  Гинзера (nb0111.ginzercorp.com).


  Для расследования инцидента была привлечена blue team, роль лидера

  которой вам предстоит примерить на себя.

  '
